<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMEF Frei Constâncio - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #1c1e21; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Acesso Escolar</h2>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
</div>

<script>
    const SUPABASE_URL = 'https://rtupkottdmtuxeumzwjd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Y4UYgwz6_dUcLtk2oW3P-A_BucVzN3a';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function entrar() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Erro: " + error.message);
            return;
        }

        // Busca o CARGO real do perfil no banco
        const userId = data.user.id;
        const { data: profile, error: profileError } = await _supabase
            .from('profiles')
            .select('NOME, CARGO')
            .eq('id', userId)
            .single();

        if (profileError || !profile) {
            alert("Login realizado! Bem-vindo.");
        } else {
            const cargoFormatado = profile.CARGO ? profile.CARGO.toLowerCase() : 'usuário';
            alert("Login realizado! Bem-vindo, " + cargoFormatado + ".");
        }

        window.location.href = 'dashboard.html?v=2';
    }
</script>

</body>
</html>
