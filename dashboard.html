<body>

<header>
    <h1>Sistema de Gestão Escolar</h1>
</header>

<div class="container">
    <div class="welcome-card">
        <!-- IDs adicionados para o JavaScript preencher -->
        <h2 id="nomeBemVindo">Carregando...</h2>
        <p>Gestão Pedagógica - EMEF Frei Constâncio</p>
        <p><strong>Cargo:</strong> <span id="cargoUsuario">-</span></p>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="abrirDiario()">📝 Lançar Notas (Professor)</div>
        <div class="menu-item">📋 Frequência Escolar</div>
        <div class="menu-item">📊 Relatórios Estatísticos</div>
    </div>

    <div id="areaDiario" class="secao-diario">
        <h3>Diário de Classe Eletrônico</h3>
        <div style="margin-bottom: 15px;">
            <label><strong>Selecione a Turma/Disciplina:</strong></label>
            <select id="selectAtribuicao" onchange="carregarAlunosDoBanco()" style="padding: 8px; border-radius: 4px;">
                <option value="">-- Selecione --</option>
            </select>
        </div>

        <table id="tabelaLancamento">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>1AVA(P2)</th>
                    <th>2AVA(P3)</th>
                    <th>1REC</th>
                    <th>3AVA(P2)</th>
                    <th>4AVA(P3)</th>
                    <th>2REC</th>
                    <th>Aulas</th>
                    <th>Faltas</th>
                    <th>Média Final</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
        
        <button class="btn-salvar" onclick="salvarNoSupabase()">Salvar Dados no Banco</button>
        <div style="clear: both;"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://rtupkottdmtuxeumzwjd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Y4UYgwz6_dUcLtk2oW3P-A_BucVzN3a';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let PROFESSOR_NOME = ""; 

    // FUNÇÃO NOVA: Verifica quem logou
    async function verificarSessao() {
        const { data: { user } } = await _supabase.auth.getUser();

        if (!user) {
            window.location.href = "login.html"; // Se não logou, volta pro login
            return;
        }

        // Busca o nome e cargo na tabela profiles
        const { data: profile } = await _supabase.from('profiles')
            .select('NOME, cargo')
            .eq('id', user.id)
            .single();

        if (profile) {
            PROFESSOR_NOME = profile.NOME;
            document.getElementById('nomeBemVindo').innerText = `Bem-vindo, ${profile.NOME}`;
            document.getElementById('cargoUsuario').innerText = profile.cargo;
        }
    }

    // Roda ao carregar a página
    window.onload = verificarSessao;

    async function abrirDiario() {
        if (!PROFESSOR_NOME) return alert("Erro ao identificar professor.");
        
        document.getElementById('areaDiario').style.display = 'block';
        const { data } = await _supabase.from('atribuicoes')
            .select('*')
            .eq('PROFESSOR', PROFESSOR_NOME);

        const sel = document.getElementById('selectAtribuicao');
        sel.innerHTML = '<option value="">-- Selecione --</option>';
        
        if (data) {
            data.forEach(at => {
                let opt = document.createElement('option');
                opt.value = at.TURMA;
                opt.text = `${at.DISCIPLINA} - ${at.TURMA}`;
                opt.dataset.disciplina = at.DISCIPLINA;
                sel.appendChild(opt);
            });
        }
    }

    // As funções carregarAlunosDoBanco, calc e salvarNoSupabase continuam as mesmas do seu código original...
    // (Apenas certifique-se de mantê-las abaixo)
</script>
